<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Orbiting rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid transparent;
      animation: orbit linear infinite;
    }

    .ring-1 {
      width: 300px; height: 300px;
      border-color: rgba(232,184,75,0.8);
      animation-duration: 4s;
    }
    .ring-2 {
      width: 450px; height: 450px;
      border-color: rgba(232,184,75,0.4);
      animation-duration: 7s;
      animation-direction: reverse;
    }
    .ring-3 {
      width: 600px; height: 600px;
      border-color: rgba(232,184,75,0.2);
      animation-duration: 11s;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Center text */
    .center {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .title {
      font-size: 72px;
      font-weight: 700;
      color: #e8b84b;
      letter-spacing: 0.15em;
      animation: pulse 3s ease-in-out infinite;
    }

    .subtitle {
      font-size: 22px;
      color: rgba(232,184,75,0.5);
      letter-spacing: 0.3em;
      margin-top: 16px;
      animation: pulse 3s ease-in-out infinite;
      animation-delay: 1.5s;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* Particles */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #e8b84b;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-800px) translateX(200px); opacity: 0; }
    }
  </style>
</head>
<body>
<div class="scene">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="center">
    <div class="title">HTML → VIDEO</div>
    <div class="subtitle">RENDER TEST · 1080P · 30FPS</div>
  </div>
  <!-- Particles -->
  <script>
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top  = Math.random() * 100 + '%';
      p.style.animationDuration = (4 + Math.random() * 8) + 's';
      p.style.animationDelay    = (Math.random() * 5) + 's';
      p.style.opacity = Math.random() * 0.8;
      document.querySelector('.scene').appendChild(p);
    }
  </script>
</div>
</body>
</html>
